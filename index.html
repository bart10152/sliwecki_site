<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bartosz Śliwecki</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=EB+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000;
      --fg: #fff;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .wrap {
      max-width: 60rem;
      line-height: 1.4;
    }

    .quote {
      font-family: "EB Garamond", Georgia, "Times New Roman", serif;
      font-style: italic;
      margin: 0 0 18px 0;
      font-size: 1.15rem;
      opacity: 0.95;
    }

    .name {
      margin: 0 0 18px 0;
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: 0.01em;
    }

    .phone-container {
      margin-top: 10px;
    }

    button {
      background: #fff;
      color: #000;
      border: none;
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 4px;
      font-family: inherit;
      transition: opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.85;
    }

    .phone {
      margin-top: 12px;
      font-style: italic;
      font-size: 1.05rem;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <p class="quote">"Przepraszam, ale jestem obecnie zajęty zabezpieczaniem swoich klientów. Ładna strona jest teraz nie istotna".</p>
    <p class="name">Bartosz Śliwecki</p>

    <div class="phone-container">
      <button id="revealBtn">Pokaż numer</button>
      <div id="phoneOutput" class="phone"></div>
    </div>
  </main>

  <script>
    document.getElementById("revealBtn").addEventListener("click", function () {
      const part1 = "+48";
      const part2 = "508";
      const part3 = "473";
      const part4 = "105";

      const fullNumber = `${part1} ${part2} ${part3} ${part4}`;
      const telLink = `${part1}${part2}${part3}${part4}`;

      const output = document.getElementById("phoneOutput");
      output.innerHTML = `<a href="tel:${telLink}" style="color:white; text-decoration:none;">${fullNumber}</a>`;

      this.style.display = "none";
    });
  </script>

</body>
</html>
