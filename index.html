<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bartosz Śliwecki</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Nowe, mocniejsze kolory: Głęboki granat i szlachetne złoto */
      --bg: #1A1C2C;   
      --fg: #EAE2B7;   
      --accent: #D62828; /* Dyskretny kolor akcentu dla linków */
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      font-family: "Saira", system-ui, sans-serif;
    }

    .wrap {
      max-width: 36rem; /* Nieco szerzej dla większej czcionki */
      line-height: 1.8; 
      flex: 1; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 1s ease-out forwards;
    }

    .quote {
      font-style: italic;
      margin: 0; 
      font-size: 1.25rem; /* Powiększona czcionka */
      font-weight: 400;   /* Standardowa waga dla czytelności */
      opacity: 1;         /* Pełne krycie, by nie było "wyprane" */
    }

    .name {
      margin: 50px 0; 
      font-weight: 800;   /* Bardzo wyraźne nazwisko */
      font-size: 2rem;    /* Wyraźnie większe */
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #FFF;        /* Czysta biel dla nazwiska, by "biło" po oczach */
    }

    .phone-container {
      min-height: 80px; 
    }

    button {
      background: var(--fg);
      color: var(--bg);
      border: none;
      padding: 16px 36px;
      font-size: 1.1rem;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: transform 0.2s, background 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #FFF;
    }

    .phone {
      font-size: 1.8rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .phone.visible {
      opacity: 1;
    }

    .phone a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 2px solid var(--fg);
    }

    footer {
      width: 100%;
      padding-top: 40px;
      font-size: 0.85rem;
      font-weight: 400;
      opacity: 0.7; 
      animation: fadeIn 1s ease-out 0.5s forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    footer a {
      color: var(--fg);
      font-weight: 600;
    }

    @media (min-width: 600px) {
      footer {
        flex-direction: row;
        justify-content: center;
        gap: 20px;
      }
      footer div:not(:last-child)::after {
        content: "|";
        margin-left: 20px;
      }
    }

    @media (max-width: 480px) {
      .quote { font-size: 1.15rem; }
      .name { font-size: 1.6rem; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <p class="quote">
      "Przepraszam, ale jestem obecnie zajęty zabezpieczaniem swoich klientów.<br>
      Ładna strona jest teraz nieistotna".
    </p>

    <p class="name">Bartosz Śliwecki</p>

    <div class="phone-container">
      <button id="revealBtn">Ustalmy priorytety</button>
      <div id="phoneOutput" class="phone"></div>
    </div>
  </main>

  <footer>
    <div>Nr wpisu RAU: <strong>11769310/P</strong></div>
    <div>Organ nadzorczy: <a href="https://rpu.knf.gov.pl/search/agentsEmployee/11769310%2FP/364263" target="_blank" rel="noopener">KNF</a></div>
  </footer>

  <script>
    document.getElementById("revealBtn").addEventListener("click", function () {
      const p1 = "+48", p2 = "508", p3 = "473", p4 = "105";
      const fullNumber = p1 + " " + p2 + " " + p3 + " " + p4;
      const telLink = p1 + p2 + p3 + p4;
      const output = document.getElementById("phoneOutput");
      
      this.style.display = "none";
      output.innerHTML = '<a href="tel:' + telLink + '">' + fullNumber + '</a>';
      
      setTimeout(() => { output.classList.add('visible'); }, 50);
    });
  </script>
</body>
</html>
