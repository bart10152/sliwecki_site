<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bartosz Śliwecki</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">

  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    :root {
      --bg: #3D405B;   /* Głęboki, spokojny granatowo-grafitowy */
      --fg: #F4F1DE;   /* Ciepła kość słoniowa */
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Page Fade-In Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      font-family: "Saira", system-ui, -apple-system, sans-serif;
    }

    .wrap {
      max-width: 32rem;
      /* Klucz do elegancji: duża interlinia */
      line-height: 1.8; 
      flex: 1; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 1.2s ease-out forwards;
    }

    .quote {
      font-style: italic;
      margin: 0; 
      font-size: 1.15rem;
      font-weight: 300;
      opacity: 0.85;
      letter-spacing: 0.01em;
    }

    .name {
      /* Zwiększony odstęp dla harmonii */
      margin: 50px 0; 
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: 0.2em; /* Szerokie światło w nazwisku buduje prestiż */
      text-transform: uppercase;
    }

    .phone-container {
      margin: 0;
      min-height: 70px; 
    }

    button {
      background: var(--fg);
      color: var(--bg);
      border: 1px solid var(--fg);
      padding: 14px 32px;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 2px;
      font-family: inherit;
      transition: all 0.4s ease;
    }

    button:hover {
      background: transparent;
      color: var(--fg);
    }

    .phone {
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .phone.visible {
      opacity: 1;
    }

    .phone a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid rgba(244, 241, 222, 0.3);
      padding-bottom: 4px;
      transition: border-color 0.3s;
    }

    .phone a:hover {
      border-bottom-color: var(--fg);
    }

    footer {
      width: 100%;
      max-width: 800px;
      padding-top: 60px;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0; 
      animation: fadeIn 1s ease-out 0.8s forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    footer a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid rgba(244, 241, 222, 0.5);
    }

    /* Tablet/Laptop footer layout */
    @media (min-width: 600px) {
      footer {
        flex-direction: row;
        justify-content: center;
        gap: 20px;
      }
      
      footer div:not(:last-child)::after {
        content: "|"; /* Pionowa kreska jest bardziej architektoniczna niż kropka */
        margin-left: 20px;
        opacity: 0.3;
      }
    }

    @media (max-width: 480px) {
      .quote { font-size: 1.05rem; line-height: 1.7; }
      .name { font-size: 1.3rem; margin: 40px 0; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <p class="quote">
      "Przepraszam, ale jestem obecnie zajęty zabezpieczaniem swoich klientów. 
      Ładna strona jest teraz nieistotna".
    </p>

    <p class="name">Bartosz Śliwecki</p>

    <div class="phone-container">
      <button id="revealBtn">Najpierw porozmawiajmy ></button>
      <div id="phoneOutput" class="phone"></div>
    </div>
  </main>

  <footer>
    <div>Nr wpisu RAU: <strong>11769310/P</strong></div>
    <div>Organ nadzorczy: <a href="https://rpu.knf.gov.pl/search/agentsEmployee/11769310%2FP/364263" target="_blank" rel="noopener">KNF</a></div>
  </footer>

  <script>
    document.getElementById("revealBtn").addEventListener("click", function () {
      const p1 = "+48";
      const p2 = "508";
      const p3 = "473";
      const p4 = "105";

      const fullNumber = p1 + " " + p2 + " " + p3 + " " + p4;
      const telLink = p1 + p2 + p3 + p4;

      const output = document.getElementById("phoneOutput");
      
      this.style.display = "none";
      output.innerHTML = '<a href="tel:' + telLink + '">' + fullNumber + '</a>';
      
      setTimeout(() => {
        output.classList.add('visible');
      }, 50);
    });
  </script>

</body>
</html>
