<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bartosz Śliwecki</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #1A1C2C;   
      --fg: #EAE2B7;   
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      font-family: "Saira", system-ui, sans-serif;
    }

    .wrap {
      max-width: 44rem; 
      line-height: 1.6; 
      flex: 1; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 1s ease-out forwards;
    }

    .quote {
      font-style: italic;
      margin: 0; 
      font-size: 1.35rem;
      font-weight: 400;
      min-height: 4.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .name {
      margin: 40px 0; 
      font-weight: 800;
      font-size: 2.2rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #FFF;
    }

    .phone-container {
      min-height: 80px; 
    }

    button {
      background: var(--fg);
      color: var(--bg);
      border: none;
      padding: 18px 40px;
      font-size: 1.1rem;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: transform 0.2s, background 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #FFF;
    }

    .phone {
      font-size: 1.9rem;
      font-weight: 400;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .phone.visible {
      opacity: 1;
    }

    .phone a {
      color: var(--fg);
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    footer {
      width: 100%;
      padding-top: 40px;
      font-size: 0.8rem;
      font-weight: 400;
      opacity: 0.6; 
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    footer a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid rgba(234, 226, 183, 0.3);
    }

    @media (min-width: 600px) {
      footer {
        flex-direction: row;
        justify-content: center;
        gap: 20px;
      }
      footer div:not(:last-child)::after {
        content: "|";
        margin-left: 20px;
        opacity: 0.5;
      }
    }

    @media (max-width: 480px) {
      .quote { font-size: 1.15rem; }
      .name { font-size: 1.7rem; }
      .phone { font-size: 1.6rem; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <p class="quote" id="dynamicQuote"></p>

    <p class="name">Bartosz Śliwecki</p>

    <div class="phone-container">
      <button id="revealBtn">Ustalmy priorytety</button>
      <div id="phoneOutput" class="phone"></div>
    </div>
  </main>

  <footer>
    <div>Nr wpisu RAU: <strong>11769310/P</strong></div>
    <div>Organ nadzorczy: <a href="https://rpu.knf.gov.pl/search/agentsEmployee/11769310%2FP/364263" target="_blank" rel="noopener">KNF</a></div>
  </footer>

  <script>
    // Baza tekstów - teraz z poprawnymi przecinkami na końcu linii
    const quotes = [
      "Zajmuję się zabezpieczaniem przyszłości moich klientów. Estetyka strony może poczekać.",
      "Zaufanie buduje się latami, a nie layoutem. Jestem tam, gdzie potrzebują mnie klienci.",
      "Przepraszam, jestem zajęty zabezpieczaniem moich klientów. Strona musi poczekać, ich spokój nie może.",
      "Najlepsza polisa to taka, która działa. Moja strona nie musi – to ja muszę być skuteczny.",
      "Dobra strona www nie wypłaci odszkodowania. Dobrze dobrany plan – owszem.",
      "Zamiast dopieszczać stronę, dopieszczam strategie dla moich klientów. Odezwij się, jeśli potrzebujesz konkretów.",
      "Zaufanie buduję przy kawie i w rozmowie, nie na serwerze. Strona powstanie, gdy wszyscy klienci będą już bezpieczni."
    ];

    window.onload = function() {
      const randomIndex = Math.floor(Math.random() * quotes.length);
      const quoteElement = document.getElementById("dynamicQuote");
      if (quoteElement) {
        quoteElement.innerText = `"${quotes[randomIndex]}"`;
      }
    };

    document.getElementById("revealBtn").addEventListener("click", function () {
      const p = ["+48", "508", "473", "105"];
      const fullNumber = p.join(" ");
      const telLink = p.join("");
      const output = document.getElementById("phoneOutput");
      
      this.style.display = "none";
      output.innerHTML = '<a href="tel:' + telLink + '">' + fullNumber + '</a>';
      
      setTimeout(() => { 
        if (output) output.classList.add('visible'); 
      }, 50);
    });
  </script>
</body>
</html>
