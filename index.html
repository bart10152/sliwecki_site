<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bartosz Śliwecki | Ubezpieczenia</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #1c1f24;   /* dark graphite */
      --fg: #f2f2f2;   /* softened white */
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      font-family: "Saira", system-ui, -apple-system, sans-serif;
    }

    .wrap {
      max-width: 34rem;
      line-height: 1.4;
      flex: 1; /* Pushes footer down */
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .quote {
      font-style: italic;
      margin: 0 0 18px 0;
      font-size: 1.15rem;
      opacity: 0.9;
    }

    .name {
      margin: 0 0 18px 0;
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .phone-container {
      margin-top: 10px;
      min-height: 50px; /* Prevents layout jump when button disappears */
    }

    button {
      background: #f2f2f2;
      color: #1c1f24;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: 4px;
      font-family: inherit;
      transition: transform 0.1s ease, opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .phone {
      margin-top: 12px;
      font-style: italic;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .phone a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px dashed var(--fg);
    }

    footer {
      width: 100%;
      padding-top: 40px;
      font-size: 0.75rem;
      opacity: 0.5;
      line-height: 1.6;
    }

    footer a {
      color: var(--fg);
      text-decoration: underline;
    }

    /* Small mobile adjustments */
    @media (max-width: 480px) {
      .quote { font-size: 1rem; }
      .name { font-size: 1.4rem; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <p class="quote">
      "Przepraszam, ale jestem obecnie zajęty zabezpieczaniem swoich klientów. 
      Ładna strona jest teraz nieistotna".
    </p>

    <p class="name">Bartosz Śliwecki</p>

    <div class="phone-container">
      <button id="revealBtn">Ustalmy priorytety</button>
      <div id="phoneOutput" class="phone"></div>
    </div>
  </main>

  <footer>
    <div>Nr wpisu do rejestru agentów (RAU): <strong>11769310/P</strong></div>
    <div>Organ nadzorczy: <a href="https://rpu.knf.gov.pl/search/agentsEmployee/11769310%2FP/364263" target="_blank" rel="noopener">Komisja Nadzoru Finansowego</a></div>
  </footer>

  <script>
    document.getElementById("revealBtn").addEventListener("click", function () {
      // Obfuscation to prevent simple bot scraping
      const p1 = "+48";
      const p2 = "508";
      const p3 = "473";
      const p4 = "105";

      const fullNumber = p1 + " " + p2 + " " + p3 + " " + p4;
      const telLink = p1 + p2 + p3 + p4;

      const output = document.getElementById("phoneOutput");
      output.innerHTML = '<a href="tel:' + telLink + '">' + fullNumber + '</a>';

      this.style.display = "none";
    });
  </script>

</body>
</html>
