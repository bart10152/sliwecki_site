<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bartosz Śliwecki</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    :root {
      --bg: #F2EFE9;   /* dark graphite */
      --fg: #1A2238;   /* softened white */
    }

    * {
      box-sizing: border-box;
    }

    /* Page Fade-In Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      font-family: "Saira", system-ui, -apple-system, sans-serif;
    }

    .wrap {
      max-width: 34rem;
      line-height: 1.4;
      flex: 1; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      /* Animation for whole content */
      animation: fadeIn 1s ease-out forwards;
    }

    .quote {
      font-style: italic;
      margin: 0; 
      font-size: 1.15rem;
      opacity: 0.9;
    }

    .name {
      /* Symmetrical 30px spacing */
      margin: 30px 0; 
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .phone-container {
      margin: 0;
      min-height: 60px; 
    }

    button {
      background: #1A2238;
      color: #F2EFE9;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: 4px;
      font-family: inherit;
      transition: opacity 0.3s ease;
    }

    button:hover {
      opacity: 0.8;
    }

    .phone {
      font-size: 1.4rem;
      font-weight: 400; /* Regular as requested */
      letter-spacing: normal;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .phone.visible {
      opacity: 1;
    }

    .phone a {
      color: var(--fg);
      text-decoration: none;
    }

    footer {
      width: 100%;
      max-width: 800px;
      padding-top: 40px;
      font-size: 0.75rem;
      opacity: 0; 
      animation: fadeIn 1s ease-out 0.5s forwards; /* Delayed appearance */
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    footer a {
      color: var(--fg);
      text-decoration: underline;
    }

    /* Tablet/Laptop footer layout */
    @media (min-width: 600px) {
      footer {
        flex-direction: row;
        justify-content: center;
        gap: 12px;
      }
      
      footer div:not(:last-child)::after {
        content: "•";
        margin-left: 12px;
        opacity: 0.5;
      }
    }

    @media (max-width: 480px) {
      .quote { font-size: 1rem; }
      .name { font-size: 1.4rem; margin: 24px 0; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <p class="quote">
      "Przepraszam, ale jestem obecnie zajęty zabezpieczaniem swoich klientów. 
      Ładna strona jest teraz nieistotna".
    </p>

    <p class="name">Bartosz Śliwecki</p>

    <div class="phone-container">
      <button id="revealBtn">Ustalmy priorytety</button>
      <div id="phoneOutput" class="phone"></div>
    </div>
  </main>

  <footer>
    <div>Nr wpisu RAU: <strong>11769310/P</strong></div>
    <div>Organ nadzorczy: <a href="https://rpu.knf.gov.pl/search/agentsEmployee/11769310%2FP/364263" target="_blank" rel="noopener">KNF</a></div>
  </footer>

  <script>
    document.getElementById("revealBtn").addEventListener("click", function () {
      const p1 = "+48";
      const p2 = "508";
      const p3 = "473";
      const p4 = "105";

      const fullNumber = p1 + " " + p2 + " " + p3 + " " + p4;
      const telLink = p1 + p2 + p3 + p4;

      const output = document.getElementById("phoneOutput");
      
      this.style.display = "none";
      output.innerHTML = '<a href="tel:' + telLink + '">' + fullNumber + '</a>';
      
      setTimeout(() => {
        output.classList.add('visible');
      }, 10);
    });
  </script>

</body>
</html>
