<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bartosz Śliwecki</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,300;0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Paleta barw MacBook Air Silver / Space Gray */
      --bg: #1D1D1F;       /* Głęboki grafit obudowy */
      --fg: #E8E8ED;       /* Jasne srebro (aluminium) */
      --pure-white: #FFFFFF;
      --midnight: #121213;  /* Prawie czerń do tekstów na przycisku */
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Subtelna animacja wejścia */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      font-family: "Saira", system-ui, -apple-system, sans-serif;
    }

    .wrap {
      max-width: 44rem; 
      line-height: 1.6; 
      flex: 1; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 1.2s ease-out forwards;
    }

    .quote {
      font-style: italic;
      margin: 0; 
      font-size: 1.35rem;
      font-weight: 300;
      min-height: 4.5rem; 
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fg);
    }

    .name {
      margin: 40px 0; 
      font-weight: 800;
      font-size: 2.3rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--pure-white); /* Najjaśniejszy punkt strony */
    }

    .phone-container {
      min-height: 80px; 
    }

    button {
      background: var(--fg);
      color: var(--midnight);
      border: 1px solid var(--fg);
      padding: 18px 42px;
      font-size: 1.1rem;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    button:hover {
      background: transparent;
      color: var(--fg);
      transform: translateY(-2px);
    }

    .phone {
      font-size: 2rem;
      font-weight: 400; /* Lekka waga numeru */
      opacity: 0;
      transition: opacity 1s ease;
    }

    .phone.visible {
      opacity: 1;
    }

    .phone a {
      color: var(--fg);
      text-decoration: none;
      letter-spacing: 0.08em;
    }

    footer {
      width: 100%;
      padding-top: 50px;
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.4; 
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    footer a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 232, 237, 0.2);
    }

    /* Responsywność dla komputerów i telefonów */
    @media (min-width: 600px) {
      footer {
        flex-direction: row;
        justify-content: center;
        gap: 20px;
      }
      footer div:not(:last-child)::after {
        content: "|";
        margin-left: 20px;
        opacity: 0.3;
      }
    }

    @media (max-width: 480px) {
      .quote { font-size: 1.15rem; }
      .name { font-size: 1.7rem; }
      .phone { font-size: 1.6rem; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <p class="quote" id="dynamicQuote"></p>

    <p class="name">Bartosz Śliwecki</p>

    <div class="phone-container">
      <button id="revealBtn">Sprawdźmy możliwości</button>
      <div id="phoneOutput" class="phone"></div>
    </div>
  </main>

  <footer>
    <div>Nr wpisu RAU: <strong>11769310/P</strong></div>
    <div>Organ nadzorczy: <a href="https://rpu.knf.gov.pl/search/agentsEmployee/11769310%2FP/364263" target="_blank" rel="noopener">KNF</a></div>
  </footer>

  <script>
    // Twoja baza tekstów
    const quotes = [
      "Zajmuję się zabezpieczaniem przyszłości moich klientów. Estetyka strony może poczekać.",
      "Zaufanie buduje się latami, a nie layoutem. Jestem tam, gdzie potrzebują mnie klienci.",
      "Przepraszam, jestem zajęty zabezpieczaniem moich klientów. Strona musi poczekać, ich spokój nie może.",
      "Najlepsza polisa to taka, która działa. Moja strona nie musi – to ja muszę być skuteczny.",
      "Dobra strategia nie wypłaci odszkodowania, ale dobrze dobrany plan – owszem.",
      "Zamiast dopieszczać stronę, dopieszczam strategie dla moich klientów. Odezwij się, jeśli potrzebujesz konkretów.",
      "Zaufanie buduję przy kawie i w rozmowie, nie na serwerze. Strona powstanie, gdy wszyscy klienci będą już bezpieczni."
    ];

    // Losowanie cytatu przy wejściu na stronę
    window.onload = function() {
      const randomIndex = Math.floor(Math.random() * quotes.length);
      const quoteElement = document.getElementById("dynamicQuote");
      if (quoteElement) {
        quoteElement.innerText = `"${quotes[randomIndex]}"`;
      }
    };

    // Skrypt odkrywania numeru telefonu
    document.getElementById("revealBtn").addEventListener("click", function () {
      const p = ["+48", "508", "473", "105"];
      const fullNumber = p.join(" ");
      const telLink = p.join("");
      const output = document.getElementById("phoneOutput");
      
      this.style.display = "none";
      output.innerHTML = '<a href="tel:' + telLink + '">' + fullNumber + '</a>';
      
      setTimeout(() => { 
        if (output) output.classList.add('visible'); 
      }, 50);
    });
  </script>
</body>
</html>
